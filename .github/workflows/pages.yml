name: Deploy dashboard to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: dashboard/pnpm-lock.yaml
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint
      - name: Test
        run: pnpm test
      - name: Build Pages site
        env:
          VITE_BASE_PATH: /WorldEval/
          VITE_CONTROLLER_LAB_URL: ${{ vars.CONTROLLER_LAB_URL }}
          VITE_YOUTUBE_SOLO_ID: ${{ vars.YOUTUBE_SOLO_ID }}
          VITE_YOUTUBE_DUEL_ID: ${{ vars.YOUTUBE_DUEL_ID }}
          VITE_YOUTUBE_TRIO_ID: ${{ vars.YOUTUBE_TRIO_ID }}
        run: pnpm build:pages
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
