server {
    listen 80;
    listen [::]:80;
    server_name godot.lissan.dev openai-buildweek.lissan.dev;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name godot.lissan.dev;

    root /home/lissan/codex-build-week/WorldEval/exports/godot-web;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/godot.lissan.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/godot.lissan.dev/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location = / {
        try_files /index.html =404;
    }

    location ~ \.wasm$ {
        default_type application/wasm;
        try_files $uri =404;
    }

    location / {
        try_files $uri =404;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name openai-buildweek.lissan.dev;

    root /home/lissan/codex-build-week/WorldEval/dashboard/dist;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/godot.lissan.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/godot.lissan.dev/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location = /lab {
        return 308 /lab/;
    }

    location /lab/ {
        alias /home/lissan/codex-build-week/WorldEval/dashboard/dist-lab/;
        try_files $uri $uri/ /lab/index.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
